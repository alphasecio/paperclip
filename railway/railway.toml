[build]
  dockerfilePath = "railway/Dockerfile"

[deploy]
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5

[[volumes]]
  mountPath = "/paperclip"

[env]
  BETTER_AUTH_SECRET             = "${{secret(32)}}"
  PAPERCLIP_AGENT_JWT_SECRET     = "${{secret(32)}}"
  PAPERCLIP_PUBLIC_URL           = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
  PAPERCLIP_ALLOWED_HOSTNAMES    = "${{RAILWAY_PUBLIC_DOMAIN}}"
  PAPERCLIP_HOME                 = "/paperclip"
  HOST                           = "0.0.0.0"
  PORT                           = "3100"
  NODE_ENV                       = "production"
  PAPERCLIP_TELEMETRY_DISABLED   = "1"
  DO_NOT_TRACK                   = "1"
  PAPERCLIP_AUTH_DISABLE_SIGN_UP = ""
  ANTHROPIC_API_KEY              = ""
  OPENAI_API_KEY                 = ""
